{{ define "main" }}
<style>
    .content {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
    }
    
    .markdown-body {
        margin-left: 2rem;
        margin-right: 2rem;
        max-width: 90vw;
        padding: 2rem;
        color: var(--text-color);
        background-color: var(--card-bg-color);
        border-radius: var(--radius-lg);
    }
</style>
<div class="content">
    <h1 style="text-align: center;">{{ .Title }}</h1>
    <div class="markdown-body shadow-soft">
        {{ .Content }}
    </div>
    <p>发布日期：{{ .Date.Format "January 2, 2006" }}</p>
</div>
{{ end }}
